<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Timetable — Spring 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --sleep-bg: #EEE8FE; --sleep-tx: #3C3489; --sleep-bd: #7F77DD;
    --wake-bg:  #E1F5EE; --wake-tx:  #085041; --wake-bd:  #1D9E75;
    --meal-bg:  #FAEEDA; --meal-tx:  #633806; --meal-bd:  #BA7517;
    --theory-bg:#E6F1FB; --theory-tx:#0C447C; --theory-bd:#378ADD;
    --lab-bg:   #FAECE7; --lab-tx:   #4A1B0C; --lab-bd:   #D85A30;
    --study-bg: #EAF3DE; --study-tx: #173404; --study-bd: #639922;
    --free-bg:  #F5F4F0; --free-tx:  #444441; --free-bd:  #B4B2A9;
    --bg: #FAFAF8; --surface: #FFFFFF; --border: #E8E6E0;
    --text: #1A1A18; --muted: #6B6B66; --accent: #2C2C2A;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }

  .header { background: var(--accent); color: #fff; padding: 40px 32px 32px; position: relative; overflow: hidden; }
  .header::before { content:''; position:absolute; top:-60px; right:-60px; width:260px; height:260px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .header::after  { content:''; position:absolute; bottom:-40px; left:40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.03); }
  .header-inner { position:relative; z-index:1; max-width:900px; margin:0 auto; }
  .header h1 { font-family:var(--font-display); font-size:clamp(26px,5vw,42px); font-weight:800; letter-spacing:-0.5px; line-height:1.1; }
  .header-meta { margin-top:10px; display:flex; flex-wrap:wrap; gap:16px; }
  .meta-pill { font-size:12px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; color:rgba(255,255,255,0.55); display:flex; align-items:center; gap:6px; }
  .meta-pill span { color:rgba(255,255,255,0.9); }

  .legend-wrap { max-width:900px; margin:24px auto 0; padding:0 20px; }
  .legend { display:flex; flex-wrap:wrap; gap:8px; }
  .leg { display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:500; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 10px 4px 7px; }
  .leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

  .stats-bar { max-width:900px; margin:20px auto 0; padding:0 20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; text-align:center; }
  .stat-val { font-family:var(--font-display); font-size:22px; font-weight:800; color:var(--text); line-height:1; }
  .stat-lbl { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-top:4px; }

  .tabs-wrap { max-width:900px; margin:24px auto 0; padding:0 20px; }
  .tabs { display:flex; gap:4px; flex-wrap:wrap; border-bottom:2px solid var(--border); }
  .tab-btn { font-family:var(--font-display); font-size:13px; font-weight:700; letter-spacing:0.3px; padding:10px 18px; border:none; background:transparent; color:var(--muted); cursor:pointer; border-radius:8px 8px 0 0; position:relative; bottom:-2px; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s,background 0.2s; }
  .tab-btn:hover { color:var(--text); background:var(--border); }
  .tab-btn.active { color:var(--text); border-bottom:2px solid var(--accent); background:var(--bg); }

  .panels-wrap { max-width:900px; margin:0 auto; padding:0 20px; }
  .day-panel { display:none; }
  .day-panel.active { display:block; }

  .timeline { margin-top:14px; display:flex; flex-direction:column; gap:5px; }
  .block { display:grid; grid-template-columns:96px 1fr; gap:10px; align-items:stretch; opacity:0; transform:translateY(6px); transition:opacity 0.26s ease,transform 0.26s ease; }
  .block.visible { opacity:1; transform:translateY(0); }
  .time-col { display:flex; align-items:flex-start; justify-content:flex-end; padding-top:9px; }
  .time-label { font-size:10.5px; font-weight:500; color:var(--muted); text-align:right; line-height:1.4; font-variant-numeric:tabular-nums; }
  .card { border-radius:var(--radius); padding:9px 13px; border-left:3px solid transparent; transition:transform 0.15s ease,box-shadow 0.15s ease; }
  .card:hover { transform:translateX(2px); box-shadow:0 2px 12px rgba(0,0,0,0.07); }
  .card-title { font-size:13px; font-weight:600; line-height:1.35; font-family:var(--font-display); }
  .card-sub { font-size:11px; margin-top:2px; font-weight:300; opacity:0.78; line-height:1.4; }

  .t-sleep  { background:var(--sleep-bg);  border-color:var(--sleep-bd);  color:var(--sleep-tx); }
  .t-wake   { background:var(--wake-bg);   border-color:var(--wake-bd);   color:var(--wake-tx);  }
  .t-meal   { background:var(--meal-bg);   border-color:var(--meal-bd);   color:var(--meal-tx);  }
  .t-theory { background:var(--theory-bg); border-color:var(--theory-bd); color:var(--theory-tx);}
  .t-lab    { background:var(--lab-bg);    border-color:var(--lab-bd);    color:var(--lab-tx);   }
  .t-study  { background:var(--study-bg);  border-color:var(--study-bd);  color:var(--study-tx); }
  .t-free   { background:var(--free-bg);   border-color:var(--free-bd);   color:var(--free-tx);  }

  @media (max-width:520px) {
    .header { padding:28px 16px 24px; }
    .tabs-wrap,.panels-wrap,.legend-wrap,.stats-bar { padding:0 12px; }
    .block { grid-template-columns:78px 1fr; gap:7px; }
    .time-label { font-size:9.5px; }
    .tab-btn { padding:8px 11px; font-size:12px; }
  }
</style>
</head>

const tabsEl   = document.getElementById('tabs');

const statsEl  = document.getElementById('stats-bar');

function countStats(blocks) {
  let classes = 0, study = 0;
  blocks.forEach(([,,,t]) => {
    if (t==='class-t'||t==='class-l') classes++;
    else if (t==='study') study++;
  });
  return {classes,study};
}

function renderStats(day) {
  const s = countStats(DAYS[day]);
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-val">${s.classes}</div><div class="stat-lbl">Classes</div></div>

  `;
}

function activateDay(name) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.day===name));
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.toggle('active',p.dataset.day===name));
  renderStats(name);
  document.querySelector(`.day-panel[data-day="${name}"]`).querySelectorAll('.block').forEach((b,i)=>{
    b.classList.remove('visible');
    setTimeout(()=>b.classList.add('visible'),i*25);
  });
}

  const btn=document.createElement('button');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.textContent=day.slice(0,3);
  btn.dataset.day=day;
  btn.addEventListener('click',()=>activateDay(day));
  tabsEl.appendChild(btn);

  const panel=document.createElement('div');
  panel.className='day-panel'+(i===0?' active':'');
  panel.dataset.day=day;
  const timeline=document.createElement('div');
  timeline.className='timeline';

      <div class="card ${TYPE[type]}">

      </div>`;
    timeline.appendChild(block);
  });
  panel.appendChild(timeline);
  panelsEl.appendChild(panel);
